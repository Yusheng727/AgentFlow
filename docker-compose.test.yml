# 集成测试环境（本地）：PostgreSQL + Redis
# 用法：docker compose -f docker-compose.test.yml up -d
# 然后：SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/agentflow mvn verify
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow
      POSTGRES_DB: agentflow
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agentflow']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

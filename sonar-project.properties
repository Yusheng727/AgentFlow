# SonarCloud / SonarQube 项目配置
# 质量门禁（plan U0 要求，在 SonarCloud UI 配 Quality Gate）：
#   - 重复率 < 3%（Duplications Density）
#   - 覆盖率 > 80%（Coverage on New Code）
#   - 无 Major 级别漏洞（Blocker/Major = 0）

sonar.projectKey=com_agentflow_agentflow
sonar.projectName=AgentFlow
sonar.projectVersion=1.0.0-SNAPSHOT

# 源码与测试路径
sonar.sources=agentflow-core/src/main/java,agentflow-adapters/spring-ai/src/main/java,agentflow-api/src/main/java,agentflow-starter/src/main/java
sonar.tests=agentflow-core/src/test/java,agentflow-adapters/spring-ai/src/test/java,agentflow-api/src/test/java,agentflow-starter/src/test/java

sonar.java.binaries=**/target/classes
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# 排除 demo 模块（Phase 3 验证场景，非核心引擎）
sonar.exclusions=**/demo-*/**,**/build/**,**/target/**
